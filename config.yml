# Settings only

sec_download_settings:
  forms:
    10-K: 1
    10-Q: 4

  output_dir: "corpus/raw_data/sec"

  # Quarter range to pull. Set start == end for a single quarterly run.
  # For a backfill, e.g. start: 2022Q3 / end: 2026Q3 iterates every quarter
  # in that range; each quarter gets its own subdirectory.
  pull_quarters:
    start: 2016Q1
    end: 2026Q3

  # list of banks to pull filings for
  banks_file: "corpus/banks.yml"

non_sec_download_settings:
  # User-edited list of non-SEC documents to download
  sources_file: "corpus/sources.yml"

  # Base output directory; files land in <output_dir>/<category>/
  output_dir: "corpus/raw_data"

# JSONL run logs are written here, one file per script run.
log_dir: "logs"
